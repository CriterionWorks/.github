name: Notify — CriterionWorks Org

on:
  workflow_call:

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Build email subject and body
        id: build
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"

          if [ "$EVENT" = "push" ]; then
            SUBJECT="[PUSH] ${REPO} — ${{ github.ref_name }}"
            BODY="Repository : ${REPO}
          Event      : Push
          By         : ${ACTOR}
          Branch     : ${{ github.ref_name }}
          Commit     : ${{ github.sha }}
          Link       : https://github.com/${REPO}/commit/${{ github.sha }}"

          elif [ "$EVENT" = "pull_request" ]; then
            SUBJECT="[PR #${{ github.event.pull_request.number }}] ${{ github.event.pull_request.title }} — ${REPO}"
            BODY="Repository : ${REPO}
          Event      : Pull Request (${{ github.event.action }})
          By         : ${ACTOR}
          Title      : ${{ github.event.pull_request.title }}
          Branch     : ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
          Link       : ${{ github.event.pull_request.html_url }}"

          elif [ "$EVENT" = "issues" ]; then
            SUBJECT="[ISSUE #${{ github.event.issue.number }}] ${{ github.event.issue.title }} — ${REPO}"
            BODY="Repository : ${REPO}
          Event      : Issue (${{ github.event.action }})
          By         : ${ACTOR}
          Title      : ${{ github.event.issue.title }}
          Link       : ${{ github.event.issue.html_url }}"

          elif [ "$EVENT" = "release" ]; then
            SUBJECT="[RELEASE] ${{ github.event.release.tag_name }} — ${REPO}"
            BODY="Repository : ${REPO}
          Event      : Release Published
          By         : ${ACTOR}
          Tag        : ${{ github.event.release.tag_name }}
          Name       : ${{ github.event.release.name }}
          Link       : ${{ github.event.release.html_url }}"

          else
            SUBJECT="[${EVENT}] ${REPO}"
            BODY="Repository : ${REPO}
          Event      : ${EVENT}
          By         : ${ACTOR}"
          fi

          echo "subject=${SUBJECT}" >> $GITHUB_OUTPUT
          printf '%s' "${BODY}" > /tmp/email_body.txt

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          to: ratansrivastava.work@gmail.com
          from: "CriterionWorks GitHub <${{ secrets.GMAIL_USER }}>"
          subject: ${{ steps.build.outputs.subject }}
          body: file:///tmp/email_body.txt
